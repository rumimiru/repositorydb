<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>EVENT HANDLING DEMO</h1>
        
        <button id="click-btn">Click Me</button>

        <div class="field">
            <input type="text" id="user-input" placeholder="Type something...">
            <p id="key-display">Last key: None</p>
        </div>

        <div id="hover-box">Hover over me</div>

        <form id="user-form">
            <input type="text" id="form-name" placeholder="Enter name" required>
            <button type="submit">Submit Form</button>
        </form>

        <div id="output-area">
            Waiting for interaction...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
